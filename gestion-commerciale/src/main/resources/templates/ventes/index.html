<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventes</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:1rem 2rem;
            display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:#aaa; text-decoration:none;
            font-size:0.9rem; margin-left:1rem; }
        .navbar a:hover { color:white; }
        .content { padding:2rem; max-width:700px; margin:0 auto; }
        h2 { color:#1a1a2e; margin-bottom:1.5rem; }
        .card { background:white; border-radius:12px; padding:1.5rem;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:1rem; }
        .card h3 { margin-bottom:1rem; color:#333; }
        .form-group { margin-bottom:1rem;
            display:flex; flex-direction:column; gap:0.3rem; }
        label { font-size:0.8rem; color:#666; }
        select, input { padding:0.5rem 0.8rem; border:1px solid #ddd;
            border-radius:8px; font-size:0.9rem; width:100%; }
        .btn-ouvrir { width:100%; padding:0.7rem; background:#27ae60;
            color:white; border:none; border-radius:8px;
            cursor:pointer; font-size:1rem; margin-top:0.5rem; }
        .btn-ouvrir:hover { background:#219a52; }
        .alert-danger { background:#ffe0e0; color:#c0392b;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .alert-success { background:#d4edda; color:#155724;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .session-card { background:white; border-radius:12px;
            padding:1rem 1.5rem; margin-bottom:0.8rem;
            display:flex; justify-content:space-between; align-items:center;
            box-shadow:0 1px 4px rgba(0,0,0,0.06);
            border-left:4px solid #27ae60; }
        .session-info p { font-size:0.85rem; color:#666; margin-top:2px; }
        .session-info strong { color:#1a1a2e; }
        .btn-rejoindre { background:#4361ee; color:white; padding:0.5rem 1rem;
            border-radius:8px; text-decoration:none; font-size:0.85rem; }
        .boutique-affectee { background:#e3f0ff; border:1px solid #4361ee;
            border-radius:10px; padding:1rem 1.5rem; margin-bottom:1rem;
            display:flex; align-items:center; gap:0.8rem; }
        .boutique-affectee span { font-size:0.9rem; color:#4361ee;
            font-weight:500; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit"
                    style="background:none; border:none; color:#aaa;
                           cursor:pointer; font-size:0.9rem;">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="content">
    <h2>🛒 Ouvrir la journée</h2>

    <div class="alert-danger" th:if="${erreur}" th:text="${erreur}"></div>
    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>

    <!-- ✅ CAS CAISSIER — boutique pré-affectée -->
    <div th:if="${boutiqueAffectee != null}">
        <div class="boutique-affectee">
            <span>🏪</span>
            <span th:text="'Votre boutique : ' + ${boutiqueAffectee.nom}
                + ' — ' + ${boutiqueAffectee.adresse}">
            </span>
        </div>
        <div class="card">
            <h3>Ouvrir la journée</h3>
            <form th:action="@{/ventes/session/ouvrir}" method="post">
                <input type="hidden" name="localId"
                       th:value="${boutiqueAffectee.id}"/>
                <div class="form-group">
                    <label>Fonds de caisse (FCFA)</label>
                    <input type="number" name="montantOuverture"
                           step="0.01" value="0" min="0" required/>
                </div>
                <button type="submit" class="btn-ouvrir">
                    🟢 Ouvrir ma journée —
                    <span th:text="${boutiqueAffectee.nom}"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- ✅ CAS ADMIN/RESPONSABLE — voir toutes les boutiques -->
    <div th:if="${boutiqueAffectee == null}">

        <!-- Sessions déjà ouvertes -->
        <div th:if="${sessionsOuvertes != null and !sessionsOuvertes.empty}">
            <p style="font-size:0.85rem; color:#666; margin-bottom:0.8rem;
                      font-weight:500;">
                Sessions en cours :
            </p>
            <div th:each="s : ${sessionsOuvertes}">
                <div class="session-card">
                    <div class="session-info">
                        <strong th:text="${s.local.nom}"></strong>
                        <p th:text="'Ouverte à '
                            + ${#temporals.format(s.dateOuverture,'HH:mm')}
                            + ' par ' + ${s.utilisateur.prenom}
                            + ' ' + ${s.utilisateur.nom}">
                        </p>
                    </div>
                    <a th:href="@{/ventes/caisse/{id}(id=${s.id})}"
                       class="btn-rejoindre">
                        → Accéder
                    </a>
                </div>
            </div>
        </div>

        <!-- Ouvrir une nouvelle boutique -->
        <div class="card">
            <h3>Ouvrir une nouvelle boutique</h3>
            <form th:action="@{/ventes/session/ouvrir}" method="post">
                <div class="form-group">
                    <label>Boutique</label>
                    <select name="localId" required>
                        <option value="">-- Choisir la boutique --</option>
                        <option th:each="local : ${locaux}"
                                th:value="${local.id}"
                                th:text="${local.nom}
                                    + ' — ' + ${local.adresse}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fonds de caisse (FCFA)</label>
                    <input type="number" name="montantOuverture"
                           step="0.01" value="0" min="0" required/>
                </div>
                <button type="submit" class="btn-ouvrir">
                    🟢 Ouvrir la journée
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
