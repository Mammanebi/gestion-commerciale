<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bons de livraison</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:1rem 2rem;
            display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:#aaa; text-decoration:none;
            font-size:0.9rem; margin-left:1rem; }
        .navbar a:hover { color:white; }
        .content { padding:2rem; max-width:1100px; margin:0 auto; }
        h2 { color:#1a1a2e; margin-bottom:1.5rem; }
        .search-bar { background:white; border-radius:12px;
            padding:1.2rem 1.5rem; margin-bottom:1.5rem;
            display:flex; gap:0.8rem; align-items:center;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); }
        .search-bar input { flex:1; padding:0.6rem 1rem;
            border:1px solid #ddd; border-radius:8px;
            font-size:0.95rem; outline:none; }
        .search-bar input:focus { border-color:#4361ee; }
        .search-bar button { padding:0.6rem 1.5rem;
            background:#4361ee; color:white; border:none;
            border-radius:8px; cursor:pointer; font-size:0.9rem; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
        .card { background:white; border-radius:12px; padding:1.5rem;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); }
        .card h3 { margin-bottom:1rem; color:#333; font-size:1rem;
            display:flex; align-items:center; gap:0.5rem; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { text-align:left; padding:0.6rem 0.8rem;
            background:#f8f9fa; color:#666; }
        td { padding:0.6rem 0.8rem; border-bottom:1px solid #f0f0f0;
            vertical-align:middle; }
        .badge { padding:3px 10px; border-radius:12px;
            font-size:0.75rem; font-weight:500; }
        .badge-attente { background:#fff3cd; color:#856404; }
        .badge-livre   { background:#d4edda; color:#155724; }
        .btn { padding:0.35rem 0.8rem; border-radius:8px;
            text-decoration:none; font-size:0.82rem;
            display:inline-block; }
        .btn-primary { background:#4361ee; color:white; }
        .btn-success { background:#27ae60; color:white; }
        .alert-success { background:#d4edda; color:#155724;
            padding:0.8rem 1rem; border-radius:8px; margin-bottom:1rem; }
        .alert-danger { background:#ffe0e0; color:#c0392b;
            padding:0.8rem 1rem; border-radius:8px; margin-bottom:1rem; }
        .empty { text-align:center; color:#999;
            padding:2rem; font-size:0.85rem; }
        .result-box { background:#e3f0ff; border:1px solid #4361ee;
            border-radius:10px; padding:1.2rem; margin-bottom:1.5rem; }
        .result-box h4 { color:#4361ee; margin-bottom:0.5rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/ventes}">Ventes</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit"
                    style="background:none; border:none; color:#aaa;
                           cursor:pointer; font-size:0.9rem;">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="content">
    <h2>🚛 Bons de livraison</h2>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
    <div class="alert-danger"  th:if="${erreur}" th:text="${erreur}"></div>

    <!-- Barre de recherche -->
    <div class="search-bar">
        <form th:action="@{/livraisons/recherche}"
              method="get" style="display:flex; gap:0.8rem; flex:1;">
            <input type="text" name="numero"
                   th:value="${numeroRecherche}"
                   placeholder="🔍 Rechercher par N° facture ou N° bon de livraison..."/>
            <button type="submit">Rechercher</button>
        </form>
    </div>

    <!-- Résultat de recherche -->
    <div class="result-box" th:if="${bon != null}">
        <h4>📋 Résultat trouvé —
            <span th:text="${bon.numero}"></span>
        </h4>
        <p style="font-size:0.85rem; color:#333; margin-bottom:0.8rem;"
           th:text="'Client : '
               + (${bon.vente.client != null}
                   ? ${bon.vente.client.nom} : 'Client de passage')
               + ' | Magasin : ' + ${bon.magasin.nom}
               + ' | Statut : ' + ${bon.statut}">
        </p>
        <a th:href="@{/livraisons/detail/{id}(id=${bon.id})}"
           class="btn btn-primary">
            Voir le détail →
        </a>
    </div>

    <div class="grid">
        <!-- Bons en attente -->
        <div class="card">
            <h3>
                ⏳ En attente
                <span style="background:#fff3cd; color:#856404;
                             font-size:0.75rem; padding:2px 8px;
                             border-radius:12px;"
                      th:text="${enAttente.size()}">
                </span>
            </h3>
            <div th:if="${enAttente.empty}" class="empty">
                Aucune livraison en attente.
            </div>
            <table th:if="${!enAttente.empty}">
                <thead>
                    <tr>
                        <th>N° Bon</th>
                        <th>Client</th>
                        <th>Magasin</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${enAttente}">
                        <td style="font-family:monospace; font-size:0.8rem;"
                            th:text="${b.numero}"></td>
                        <td th:text="${b.vente.client != null
                            ? b.vente.client.nom : 'Passage'}"></td>
                        <td th:text="${b.magasin.nom}"></td>
                        <td th:text="${#temporals.format(
                            b.dateCreation, 'dd/MM HH:mm')}"></td>
                        <td>
                            <a th:href="@{/livraisons/detail/{id}(id=${b.id})}"
                               class="btn btn-primary">Traiter</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Bons livrés -->
        <div class="card">
            <h3>
                ✅ Livrés
                <span style="background:#d4edda; color:#155724;
                             font-size:0.75rem; padding:2px 8px;
                             border-radius:12px;"
                      th:text="${livres.size()}">
                </span>
            </h3>
            <div th:if="${livres.empty}" class="empty">
                Aucune livraison effectuée.
            </div>
            <table th:if="${!livres.empty}">
                <thead>
                    <tr>
                        <th>N° Bon</th>
                        <th>Client</th>
                        <th>Date livraison</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${livres}">
                        <td style="font-family:monospace; font-size:0.8rem;"
                            th:text="${b.numero}"></td>
                        <td th:text="${b.vente.client != null
                            ? b.vente.client.nom : 'Passage'}"></td>
                        <td th:text="${#temporals.format(
                            b.dateLivraison, 'dd/MM HH:mm')}"></td>
                        <td>
                            <a th:href="@{/livraisons/detail/{id}(id=${b.id})}"
                               class="btn btn-success">Voir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
$(document).ready(function() {
    $('#selectArticle').select2({
        placeholder: 'Tapez pour rechercher un article...',
        allowClear: true,
        width: '100%'
    });
});
</script>
</body>
</html>
