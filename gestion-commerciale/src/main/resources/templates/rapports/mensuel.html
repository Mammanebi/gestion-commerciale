<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rapport mensuel</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1a1a2e; color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: #aaa; text-decoration: none; font-size: 0.9rem; margin-left: 1rem; }
        .content { padding: 2rem; max-width: 500px; margin: 0 auto; }
        h2 { color: #1a1a2e; margin-bottom: 1.5rem; }
        .card {
            background: white; border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card h3 { margin-bottom: 1rem; color: #333; }
        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
        label { font-size: 0.8rem; color: #666; }
        select, input {
            padding: 0.5rem 0.8rem; border: 1px solid #ddd;
            border-radius: 8px; font-size: 0.9rem; width: 100%;
        }
        .btn-primary {
            width: 100%; padding: 0.7rem; background: #1a1a2e;
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-size: 1rem; margin-top: 0.5rem;
        }
        .btn-primary:hover { background: #4361ee; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none; border:none;
                    color:#aaa; cursor:pointer; font-size:0.9rem;">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="content">
    <h2>📊 Rapport mensuel</h2>
    <div class="card">
        <h3>Choisir la période</h3>
        <form th:action="@{/pdf/rapport-mensuel}" method="get" target="_blank">
            <div class="form-group">
                <label>Mois</label>
                <select name="mois" required>
                    <option value="1">Janvier</option>
                    <option value="2">Février</option>
                    <option value="3">Mars</option>
                    <option value="4">Avril</option>
                    <option value="5" selected>Mai</option>
                    <option value="6">Juin</option>
                    <option value="7">Juillet</option>
                    <option value="8">Août</option>
                    <option value="9">Septembre</option>
                    <option value="10">Octobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Décembre</option>
                </select>
            </div>
            <div class="form-group">
                <label>Année</label>
                <input type="number" name="annee"
                       value="2026" min="2020" max="2099" required/>
            </div>
            <button type="submit" class="btn-primary">
                📥 Générer le rapport PDF
            </button>
        </form>
    </div>
</div>
</body>
</html>
