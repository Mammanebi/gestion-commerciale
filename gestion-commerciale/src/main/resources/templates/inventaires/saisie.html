<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saisie inventaire</title>
    <link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:1rem 2rem;
            display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:#aaa; text-decoration:none;
            font-size:0.9rem; margin-left:1rem; }
        .content { padding:2rem; max-width:1000px; margin:0 auto; }
        h2 { color:#1a1a2e; margin-bottom:0.3rem; }
        .subtitle { color:#666; font-size:0.9rem; margin-bottom:1.5rem; }
        .card { background:white; border-radius:12px; padding:1.5rem;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:1rem; }
        table { width:100%; border-collapse:collapse; font-size:0.88rem; }
        th { text-align:left; padding:0.7rem 1rem;
            background:#f8f9fa; color:#666; }
        td { padding:0.5rem 1rem; border-bottom:1px solid #f0f0f0;
            vertical-align:middle; }
        .qte-input { width:80px; padding:0.4rem 0.6rem;
            border:1px solid #ddd; border-radius:6px;
            font-size:0.9rem; text-align:center; }
        .qte-input:focus { border-color:#4361ee; outline:none; }
        .btn-save { padding:0.3rem 0.8rem; background:#4361ee;
            color:white; border:none; border-radius:6px; cursor:pointer;
            font-size:0.82rem; }
        .ecart-pos { color:#27ae60; font-weight:500; }
        .ecart-neg { color:#e74c3c; font-weight:500; }
        .ecart-zero { color:#999; }
        .non-saisi { color:#f39c12; font-style:italic; font-size:0.82rem; }
        .progress-bar { background:#e0e0e0; border-radius:10px;
            height:8px; margin-bottom:1rem; }
        .progress-fill { background:#4361ee; border-radius:10px;
            height:8px; transition:width 0.3s; }
        .stats-row { display:flex; gap:1rem; margin-bottom:1rem; }
        .stat-box { flex:1; background:#f8f9fa; border-radius:8px;
            padding:0.8rem; text-align:center; }
        .stat-val { font-size:1.2rem; font-weight:700; color:#1a1a2e; }
        .stat-lbl { font-size:0.75rem; color:#888; margin-top:2px; }
        .btn-valider { width:100%; padding:0.8rem; background:#27ae60;
            color:white; border:none; border-radius:8px;
            cursor:pointer; font-size:1rem; margin-top:1rem; }
        .alert-success { background:#d4edda; color:#155724;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .alert-danger { background:#ffe0e0; color:#c0392b;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .badge-valide { background:#d4edda; color:#155724;
            padding:4px 12px; border-radius:12px; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/inventaires}">← Inventaires</a>
        <a th:href="@{/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" style="background:none; border:none;
                    color:#aaa; cursor:pointer; font-size:0.9rem;">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="content">
    <h2 th:text="'Inventaire — ' + ${inventaire.local.nom}"></h2>
    <p class="subtitle"
       th:text="${inventaire.type}
           + ' — ' + ${#temporals.format(
               inventaire.dateInventaire,'dd/MM/yyyy HH:mm')}
           + ' — Par ' + ${inventaire.utilisateur.prenom}
           + ' ' + ${inventaire.utilisateur.nom}">
    </p>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
    <div class="alert-danger"  th:if="${erreur}" th:text="${erreur}"></div>

    <!-- Statut validé -->
    <div th:if="${inventaire.statut == 'VALIDE'}"
         style="background:#d4edda; border-radius:10px; padding:1rem;
                margin-bottom:1rem; text-align:center;">
        <span class="badge-valide" style="font-size:1rem;">
            ✅ Inventaire validé le
            <span th:text="${#temporals.format(
                inventaire.dateValidation,'dd/MM/yyyy HH:mm')}">
            </span>
        </span>
    </div>

    <!-- Stats progression -->
    <div th:if="${inventaire.statut == 'EN_COURS'}">
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-val"
                     th:text="${inventaire.lignes.size()}">
                </div>
                <div class="stat-lbl">Total articles</div>
            </div>
            <div class="stat-box">
                 <!-- div class="stat-val"
                     style="color:#27ae60;"
                     th:text="${inventaire.lignes.stream()
                         .filter(l -> l.qteReelle != null)
                         .count()}">
                </div -->
				<div class="stat-val"
				                     style="color:#27ae60;"
				                     th:text="${inventaire.lignes.?[qteReelle != null].size()}">
				                </di>
                <div class="stat-lbl">Saisis</div>
            </div>
            <div class="stat-box">
                <!--div class="stat-val"
                     style="color:#f39c12;"
                     th:text="${inventaire.lignes.stream()
                         .filter(l -> l.qteReelle == null)
                         .count()}">
                </div -->
				<div class="stat-val"
				                     style="color:#f39c12;"
				                     th:text="${inventaire.lignes.?[qteReelle == null].size()}">
				                </div>
                <div class="stat-lbl">Restants</div>
            </!--div>
        </div>
    </div>

    <!-- Tableau saisie -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Référence</th>
                    <th>Désignation</th>
                    <th>Unité</th>
                    <th>Qté théorique</th>
                    <th>Qté réelle</th>
                    <th>Écart</th>
                    <th>Valeur écart</th>
                    <th th:if="${inventaire.statut == 'EN_COURS'}">
                        Action
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ligne : ${inventaire.lignes}">
                    <td style="font-family:monospace; font-size:0.8rem;"
                        th:text="${ligne.article.reference}"></td>
                    <td th:text="${ligne.article.designation}"></td>
                    <td th:text="${ligne.article.unite}"></td>
                    <td style="font-weight:500;"
                        th:text="${ligne.qteTheorique}"></td>

                    <!-- Qté réelle -->
                    <td>
                        <span th:if="${ligne.qteReelle != null}"
                              th:text="${ligne.qteReelle}"
                              style="font-weight:500;">
                        </span>
                        <span th:if="${ligne.qteReelle == null}"
                              class="non-saisi">
                            À saisir
                        </span>
                    </td>

                    <!-- Écart -->
                    <td>
                        <span th:if="${ligne.ecart != null and ligne.ecart > 0}"
                              class="ecart-pos"
                              th:text="'+' + ${ligne.ecart}"></span>
                        <span th:if="${ligne.ecart != null and ligne.ecart < 0}"
                              class="ecart-neg"
                              th:text="${ligne.ecart}"></span>
                        <span th:if="${ligne.ecart != null and ligne.ecart == 0}"
                              class="ecart-zero">0</span>
                        <span th:if="${ligne.ecart == null}"
                              class="non-saisi">—</span>
                    </td>

                    <!-- Valeur écart -->
                    <td>
                        <span th:if="${ligne.valeurEcart != null}"
                              th:text="${#numbers.formatDecimal(
                                  ligne.valeurEcart,0,'COMMA',0,'POINT')}
                                  + ' FCFA'"
                              th:style="${ligne.ecart < 0}
                                  ? 'color:#e74c3c'
                                  : (${ligne.ecart > 0}
                                      ? 'color:#27ae60' : 'color:#999')">
                        </span>
                        <span th:if="${ligne.valeurEcart == null}"
                              class="non-saisi">—</span>
                    </td>

                    <!-- Formulaire saisie -->
                    <td th:if="${inventaire.statut == 'EN_COURS'}">
                        <form th:action="@{/inventaires/saisie/{invId}/ligne/{ligId}(invId=${inventaire.id},ligId=${ligne.id})}"
                              method="post"
                              style="display:flex; gap:0.4rem; align-items:center;">
                            <input type="number"
                                   name="qteReelle"
                                   class="qte-input"
                                   th:value="${ligne.qteReelle}"
                                   min="0" required
                                   placeholder="0"/>
                            <button type="submit" class="btn-save">
                                ✓
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Validation finale -->
        <div th:if="${inventaire.statut == 'EN_COURS'}"
             style="margin-top:1.5rem; border-top:1px solid #f0f0f0;
                    padding-top:1.5rem;">
            <form th:action="@{/inventaires/valider/{id}(id=${inventaire.id})}"
                  method="post">
                <div style="margin-bottom:1rem;">
                    <label style="font-size:0.8rem; color:#666;
                                  display:block; margin-bottom:0.3rem;">
                        Observations
                    </label>
                    <textarea name="observations" rows="2"
                              style="width:100%; padding:0.5rem 0.8rem;
                                     border:1px solid #ddd; border-radius:8px;
                                     font-size:0.9rem; resize:none;"
                              placeholder="Ex: Inventaire annuel 2026, quelques écarts constatés...">
                    </textarea>
                </div>
                <button type="submit" class="btn-valider"
                        onclick="return confirm('Valider l\'inventaire ? Le stock sera mis à jour avec les quantités réelles.')">
                    ✅ Valider l'inventaire et mettre à jour le stock
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
