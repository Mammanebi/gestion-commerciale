<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventaires</title>
    <link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:1rem 2rem;
            display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:#aaa; text-decoration:none;
            font-size:0.9rem; margin-left:1rem; }
        .content { padding:2rem; max-width:1100px; margin:0 auto; }
        h2 { color:#1a1a2e; margin-bottom:1.5rem; }
        .grid { display:grid; grid-template-columns:1fr 2fr; gap:1.5rem; }
        .card { background:white; border-radius:12px; padding:1.5rem;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:1rem; }
        .card h3 { margin-bottom:1rem; color:#333; font-size:1rem; }
        .form-group { margin-bottom:1rem;
            display:flex; flex-direction:column; gap:0.3rem; }
        label { font-size:0.8rem; color:#666; }
        select, input, textarea {
            padding:0.5rem 0.8rem; border:1px solid #ddd;
            border-radius:8px; font-size:0.9rem; width:100%; }
        .btn-primary { width:100%; padding:0.7rem; background:#4361ee;
            color:white; border:none; border-radius:8px; cursor:pointer; }
        table { width:100%; border-collapse:collapse; font-size:0.88rem; }
        th { text-align:left; padding:0.6rem 1rem;
            background:#f8f9fa; color:#666; }
        td { padding:0.6rem 1rem; border-bottom:1px solid #f0f0f0;
            vertical-align:middle; }
        .badge-encours { background:#fff3cd; color:#856404;
            padding:3px 10px; border-radius:12px; font-size:0.75rem; }
        .badge-valide { background:#d4edda; color:#155724;
            padding:3px 10px; border-radius:12px; font-size:0.75rem; }
        .btn { padding:0.35rem 0.9rem; border-radius:8px;
            text-decoration:none; font-size:0.82rem;
            display:inline-block; }
        .btn-info { background:#4361ee; color:white; }
        .btn-success { background:#27ae60; color:white; }
        .alert-success { background:#d4edda; color:#155724;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .alert-danger { background:#ffe0e0; color:#c0392b;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .empty { text-align:center; color:#999; padding:2rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" style="background:none; border:none;
                    color:#aaa; cursor:pointer; font-size:0.9rem;">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="content">
    <h2>📋 Inventaires</h2>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
    <div class="alert-danger"  th:if="${erreur}" th:text="${erreur}"></div>

    <div class="grid">
        <!-- Créer un inventaire -->
        <div class="card">
            <h3>Nouvel inventaire</h3>
            <form th:action="@{/inventaires/creer}" method="post">
                <div class="form-group">
                    <label>Local</label>
                    <select name="localId" required>
                        <option value="">-- Choisir --</option>
                        <optgroup label="📦 Magasins">
                            <option th:each="l : ${locaux}"
                                    th:if="${l.type == 'MAGASIN'}"
                                    th:value="${l.id}"
                                    th:text="${l.nom}"></option>
                        </optgroup>
                        <optgroup label="🛒 Boutiques">
                            <option th:each="l : ${locaux}"
                                    th:if="${l.type == 'BOUTIQUE'}"
                                    th:value="${l.id}"
                                    th:text="${l.nom}"></option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type d'inventaire</label>
                    <select name="type" required>
                        <option value="MENSUEL">📅 Mensuel</option>
                        <option value="TRIMESTRIEL">📅 Trimestriel</option>
                        <option value="ANNUEL" selected>
                            📅 Annuel
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">
                    ➕ Créer l'inventaire
                </button>
            </form>
        </div>

        <!-- Historique -->
        <div class="card">
            <h3>Historique des inventaires</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Local</th>
                        <th>Type</th>
                        <th>Articles</th>
                        <th>Statut</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="inv : ${inventaires}">
                        <td th:text="${#temporals.format(
                            inv.dateInventaire,'dd/MM/yyyy')}">
                        </td>
                        <td th:text="${inv.local.nom}"></td>
                        <td th:text="${inv.type}"></td>
                        <td th:text="${inv.lignes.size()}
                            + ' réf.'"></td>
                        <td>
                            <span th:if="${inv.statut == 'EN_COURS'}"
                                  class="badge-encours">
                                En cours
                            </span>
                            <span th:if="${inv.statut == 'VALIDE'}"
                                  class="badge-valide">
                                ✅ Validé
                            </span>
                        </td>
                        <td>
                            <a th:if="${inv.statut == 'EN_COURS'}"
                               th:href="@{/inventaires/saisie/{id}(id=${inv.id})}"
                               class="btn btn-info">
                                Continuer
                            </a>
                            <a th:if="${inv.statut == 'VALIDE'}"
                               th:href="@{/inventaires/rapport/{id}(id=${inv.id})}"
                               class="btn btn-success">
                                Rapport
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${inventaires.empty}">
                        <td colspan="6" class="empty">
                            Aucun inventaire enregistré.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
