<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Mouvements de stock</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1a1a2e; color: white;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: #aaa; text-decoration: none; font-size: 0.9rem; margin-left: 1rem; }
        .navbar a:hover { color: white; }
        .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        h2 { color: #1a1a2e; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 1.5rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h3 { margin-bottom: 1rem; color: #333; font-size: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
        label { font-size: 0.8rem; color: #666; }
        input, select, textarea {
            padding: 0.5rem 0.8rem; border: 1px solid #ddd;
            border-radius: 8px; font-size: 0.9rem; outline: none; width: 100%;
        }
        textarea { resize: vertical; min-height: 70px; }
        .btn {
            padding: 0.5rem 1rem; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.85rem;
        }
        .btn-primary { background: #4361ee; color: white; width: 100%; padding: 0.6rem; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .alert-success {
            background: #d4edda; color: #155724;
            padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem;
        }
        .alert-danger {
            background: #ffe0e0; color: #c0392b;
            padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem;
        }
        .demande-card {
            border: 1px solid #eee; border-radius: 10px;
            padding: 1rem; margin-bottom: 1rem;
        }
        .demande-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 0.8rem;
        }
        .demande-info p { font-size: 0.85rem; color: #666; margin-top: 0.2rem; }
        .demande-info strong { color: #1a1a2e; font-size: 0.95rem; }
        .badge-attente {
            background: #fff3cd; color: #856404;
            padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;
        }
        .actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .inline-form { display: inline; }
        .empty { text-align: center; color: #999; padding: 2rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/articles}">Articles</a>
        <a th:href="@{/articles/stock}">Stock</a>
		<form th:action="@{/logout}" method="post" style="display:inline;">
		    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		    <button type="submit" style="background:none; border:none; color:#aaa; 
		            cursor:pointer; font-size:0.9rem; padding:0;">
		        Déconnexion
		    </button>
		</form>
    </div>
</nav>

<div class="content">
    <h2>Sorties de stock</h2>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
    <div class="alert-danger"  th:if="${erreur}" th:text="${erreur}"></div>

    <div class="grid">

		<!-- Formulaire demande de sortie -->
		<div class="card">
		    <h3>Nouvelle demande de sortie</h3>
		    <form th:action="@{/mouvements/demander}" method="post">

		        <!-- Type de mouvement -->
				<div class="form-group">
				    <label>Type de mouvement</label>
				    <select name="typeMouvement" id="typeMouvement"
				            onchange="toggleDestination(this.value)" required>
				        <option value="">-- Choisir le type --</option>
				        <option value="APPROVISIONNEMENT_BOUTIQUE">
				            🔄 Transfert vers boutique
				        </option>
				    </select>
				</div>

		        <!-- Boutique destination — visible si TRANSFERT -->
		        <div class="form-group" id="divDestination" style="display:none;">
		            <label>Boutique de destination</label>
		            <select name="localDestinationId" id="selectDestination">
		                <option value="">-- Choisir la boutique --</option>
		                <option th:each="local : ${locaux}"
		                        th:if="${local.type == 'BOUTIQUE'}"
		                        th:value="${local.id}"
		                        th:text="${local.nom}">
		                </option>
		            </select>
		        </div>

		        <!-- Recherche article -->
		        <!--div class="form-group">
		            <label>🔍 Rechercher un article</label>
		            <input type="text" id="searchArticleMvt"
		                   placeholder="Tapez le nom ou la référence..."
		                   oninput="filtrerStocks(this.value)"
		                   autocomplete="off"/>
		        </div -->

		        <!-- Article / Magasin source — trié et filtrable -->
		        <div class="form-group">
		            <label>Article — Magasin source</label>
		            <select name="stockId" id="selectStock" required
		                    onchange="afficherInfoStock(this)">
		                <option value="">-- Choisir --</option>

		                <!-- Groupé par MAGASIN -->
		                <optgroup label="📦 MAGASIN PRINCIPAL"
		                          th:each="local : ${locaux}"
		                          th:if="${local.type == 'MAGASIN'}"
		                          th:label="'📦 ' + ${local.nom}">
		                    <option th:each="s : ${stocks}"
		                            th:if="${s.local.id == local.id
		                                    and s.quantiteDisponible > 0}"
		                            th:value="${s.id}"
		                            th:text="${s.article.reference}
		                                + ' — ' + ${s.article.designation}"
		                            th:attr="data-nom=${s.article.designation},
		                                     data-ref=${s.article.reference},
		                                     data-local=${s.local.nom},
		                                     data-dispo=${s.quantiteDisponible},
		                                     data-unite=${s.article.unite}">
		                    </option>
		                </optgroup>
		            </select>
		        </div>

		        <!-- Info stock disponible -->
		        <div id="infoStock"
		             style="display:none; background:#e3f0ff; color:#4361ee;
		                    padding:0.6rem 0.8rem; border-radius:8px;
		                    font-size:0.85rem; margin-bottom:1rem;">
		            📦 Stock disponible : <strong id="dispoDispo"></strong>
		            &nbsp;|&nbsp; Local : <strong id="dispoLocal"></strong>
		        </div>

		        <!-- Quantité -->
		        <div class="form-group">
		            <label>Quantité demandée</label>
		            <input type="number" name="quantite" id="inputQuantite"
		                   min="1" required placeholder="Ex: 50"/>
		        </div>

		        <!-- Motif -->
		        <div class="form-group">
		            <label>Motif</label>
		            <textarea name="motif" rows="3"
		                      placeholder="Ex: Réapprovisionnement Boutique Akwa suite rupture de stock..."
		                      required></textarea>
		        </div>

		        <button type="submit" class="btn btn-primary">
		            Soumettre la demande
		        </button>
		    </form>
		</div>

        <!-- Demandes en attente -->
        <div>
            <div class="card">
                <h3>
                    Demandes en attente
                    <span th:text="'(' + ${demandes.size()} + ')'"
                          style="color:#856404; font-size:0.85rem;"></span>
                </h3>

                <div th:if="${demandes.empty}" class="empty">
                    Aucune demande en attente.
                </div>

                <div th:each="d : ${demandes}" class="demande-card">
                    <div class="demande-header">
						
						<!-- 
                        <div class="demande-info">
                            <strong th:text="${d.stock.article.designation}"></strong>
                            <p th:text="'Local : ' + ${d.stock.local.nom}"></p>
                            <p th:text="'Quantité : ' + ${d.quantite} + ' ' + ${d.stock.article.unite}"></p>
                            <p th:text="'Motif : ' + ${d.motif}"></p>
                            <p th:text="'Demandé par : ' + ${d.utilisateur.prenom} + ' ' + ${d.utilisateur.nom}"></p>
                        </div>  -->
						
						<div class="demande-info">
						    <strong th:text="${d.stock.article.designation}"></strong>
						    <p th:text="'Source : ' + ${d.stock.local.nom}"></p>
						    <!-- ✅ NOUVEAU -->
						    <p th:if="${d.localDestination != null}"
						       style="color:#4361ee; font-weight:500;"
						       th:text="'→ Destination : ' + ${d.localDestination.nom}">
						    </p>
						    <p th:if="${d.localDestination == null}"
						       style="color:#e67e22;"
						       th:text="'→ Livraison client'">
						    </p>
						    <p th:text="'Type : ' + ${d.typeMouvement}"></p>
						    <p th:text="'Quantité : ' + ${d.quantite}
						        + ' ' + ${d.stock.article.unite}"></p>
						    <p th:text="'Motif : ' + ${d.motif}"></p>
						    <p th:text="'Demandé par : ' + ${d.utilisateur.prenom}
						        + ' ' + ${d.utilisateur.nom}"></p>
						</div>
						
                        <span class="badge-attente">En attente</span>
                    </div>

                    <!-- Actions réservées au RESPONSABLE et ADMIN -->
					<div class="actions" sec:authorize="hasAnyRole('ADMIN','RESPONSABLE')">
					    <form th:action="@{/mouvements/approuver/{id}(id=${d.id})}"
					          method="post" class="inline-form">
					        <input type="hidden" name="observation" value="Approuvé"/>
					        <button type="submit" class="btn btn-success"
					                onclick="return confirm('Approuver cette sortie ?')">
					            Approuver
					        </button>
					    </form>
					    <form th:action="@{/mouvements/rejeter/{id}(id=${d.id})}"
					          method="post" class="inline-form">
					        <input type="hidden" name="motif" value="Rejeté par le responsable"/>
					        <button type="submit" class="btn btn-danger"
					                onclick="return confirm('Rejeter cette demande ?')">
					            Rejeter
					        </button>
					    </form>
					</div>

                    <p sec:authorize="hasRole('CAISSIER')"
                       style="font-size:0.8rem; color:#999; margin-top:0.5rem;">
                        En attente d'approbation du responsable
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Afficher/masquer la destination selon le type
function toggleDestination(type) {
    const div    = document.getElementById('divDestination');
    const select = document.getElementById('selectDestination');
    if (type === 'APPROVISIONNEMENT_BOUTIQUE') {
        div.style.display = 'block';
        select.required   = true;
    } else {
        div.style.display = 'none';
        select.required   = false;
        select.value      = '';
    }
}

// Filtrer les articles dans le select stock
function filtrerStocks(terme) {
    const select  = document.getElementById('selectStock');
    const options = select.querySelectorAll('option');
    const t       = terme.toLowerCase().trim();

    options.forEach(opt => {
        if (!opt.value) { opt.style.display = ''; return; }
        const nom  = (opt.getAttribute('data-nom') || '').toLowerCase();
        const ref  = (opt.getAttribute('data-ref') || '').toLowerCase();
        opt.style.display =
            (!t || nom.includes(t) || ref.includes(t)) ? '' : 'none';
    });

    // Réinitialiser si sélection masquée
    const sel = select.options[select.selectedIndex];
    if (sel && sel.style.display === 'none') {
        select.value = '';
        masquerInfoStock();
    }
}

// Afficher les infos du stock sélectionné
function afficherInfoStock(select) {
    const opt = select.options[select.selectedIndex];
    if (!opt || !opt.value) {
        masquerInfoStock();
        return;
    }
    const dispo = opt.getAttribute('data-dispo');
    const local = opt.getAttribute('data-local');
    const unite = opt.getAttribute('data-unite') || '';

    document.getElementById('infoStock').style.display = 'block';
    document.getElementById('dispoDispo').textContent  =
        dispo + ' ' + unite;
    document.getElementById('dispoLocal').textContent  = local;

    // Mettre à jour le max de la quantité
    document.getElementById('inputQuantite').max = dispo;
}

function masquerInfoStock() {
    document.getElementById('infoStock').style.display = 'none';
}
</script>

<script>
$(document).ready(function() {
    $('#selectStock').select2({
        placeholder: 'Tapez pour rechercher un article...',
        allowClear: true,
        width: '100%'
    });
    $('#selectDestination').select2({
        placeholder: 'Choisir la boutique...',
        allowClear: true,
        width: '100%'
    });
});
</script>
</body>
</html>
