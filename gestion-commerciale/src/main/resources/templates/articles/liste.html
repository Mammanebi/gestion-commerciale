<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Articles</title>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1a1a2e; color: white;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: #aaa; text-decoration: none; font-size: 0.9rem; margin-left: 1rem; }
        .navbar a:hover { color: white; }
        .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        h2 { color: #1a1a2e; margin-bottom: 1.5rem; }
        .card {
            background: white; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .card h3 { margin-bottom: 1rem; color: #333; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.6rem 1rem; background: #f8f9fa; color: #666; font-weight: 500; }
        td { padding: 0.6rem 1rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 140px; }
        label { font-size: 0.8rem; color: #666; }
        input, select {
            padding: 0.5rem 0.8rem; border: 1px solid #ddd;
            border-radius: 8px; font-size: 0.9rem; outline: none;
        }
        input:focus, select:focus { border-color: #4361ee; }
        .btn {
            padding: 0.5rem 1.2rem; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #4361ee; color: white; }
        .btn-primary:hover { background: #3451d1; }
        .btn-danger { background: #e74c3c; color: white; font-size: 0.8rem; padding: 0.3rem 0.8rem; }
        .btn-warning { background: #f39c12; color: white; font-size: 0.8rem; padding: 0.3rem 0.8rem; }
        .alert-success {
            background: #d4edda; color: #155724;
            padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem;
        }
        .badge {
            display: inline-block; padding: 2px 8px;
            border-radius: 12px; font-size: 0.75rem; font-weight: 500;
        }
        .badge-blue { background: #e3f0ff; color: #185fa5; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/articles/stock}">Stock</a>
		<form th:action="@{/logout}" method="post" style="display:inline;">
		    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		    <button type="submit" style="background:none; border:none; color:#aaa; 
		            cursor:pointer; font-size:0.9rem; padding:0;">
		        Déconnexion
		    </button>
		</form>
    </div>
</nav>
<div class="content">
    <h2>Articles</h2>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>

    <!-- Formulaire ajout / modification -->
    <div class="card">
        <h3 th:text="${article.id != null} ? 'Modifier l\'article' : 'Nouvel article'">
            Nouvel article
        </h3>
        <form th:action="@{/articles/save}" th:object="${article}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-row">
				<div class="form-group">
				    <label>Référence</label>
				    <input type="text"
				           th:value="${prochaineRef}"
				           readonly />
				</div>
                <div class="form-group" style="flex: 2;">
                    <label>Désignation</label>
                    <input type="text" th:field="*{designation}" placeholder="Ex: Tuyau PVC 50mm" required/>
                </div>
                <div class="form-group" style="flex: 0.5;">
                    <label>Unité</label>
                    <input type="text" th:field="*{unite}" placeholder="Ex: ML, PCS"/>
                </div>
                <div class="form-group" style="flex: 0.8;">
                    <label>Prix achat (FCFA)</label>
                    <input type="number" step="0.01" th:field="*{prixAchat}" placeholder="0"/>
                </div>
                <div class="form-group" style="flex: 0.8;">
                    <label>Prix vente (FCFA)</label>
                    <input type="number" step="0.01" th:field="*{prixVente}" placeholder="0" required/>
                </div>
                <div class="form-group" style="flex: 0; min-width: auto;">
                    <label>&nbsp;</label>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Liste des articles -->
    <div class="card">
        <h3>Liste des articles (<span th:text="${articles.size()}">0</span>)</h3>
        <table>
            <thead>
                <tr>
                    <th>Référence</th>
                    <th>Désignation</th>
                    <th>Unité</th>
                    <th>Prix achat</th>
                    <th>Prix vente</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="art : ${articles}">
                    <td><span class="badge badge-blue" th:text="${art.reference}"></span></td>
                    <td th:text="${art.designation}"></td>
                    <td th:text="${art.unite}"></td>
                    <td th:text="${#numbers.formatDecimal(art.prixAchat, 0, 'COMMA', 0, 'POINT')} + ' FCFA'"></td>
                    <td th:text="${#numbers.formatDecimal(art.prixVente, 0, 'COMMA', 0, 'POINT')} + ' FCFA'"></td>
                    <td>
                        <a th:href="@{/articles/edit/{id}(id=${art.id})}" class="btn btn-warning">Modifier</a>
                        <a th:href="@{/articles/delete/{id}(id=${art.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Supprimer cet article ?')">Supprimer</a>
                    </td>
                </tr>
                <tr th:if="${articles.empty}">
                    <td colspan="6" style="text-align:center; color:#999; padding: 2rem;">
                        Aucun article enregistré. Ajoutez votre premier article ci-dessus.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
$(document).ready(function() {
    $('#selectArticle').select2({
        placeholder: 'Tapez pour rechercher un article...',
        allowClear: true,
        width: '100%'
    });
});
</script>
</body>
</html>
