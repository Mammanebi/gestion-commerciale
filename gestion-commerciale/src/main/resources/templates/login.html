<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 360px;
        }
        h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            color: #333;
        }
        input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: #4361ee; }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #3451d1; }
        .error {
            background: #ffe0e0;
            color: #c0392b;
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Gestion Commerciale</h2>
    <p class="subtitle">Connectez-vous pour continuer</p>

    <div class="error" th:if="${param.error}">
        Identifiant ou mot de passe incorrect.
    </div>
    <div class="error" th:if="${param.logout}" style="background:#e0f7e0; color:#27ae60;">
        Vous avez été déconnecté.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="admin" required/>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit">Se connecter</button>
    </form>
</div>
</body>
</html>
