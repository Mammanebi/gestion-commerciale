<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réceptions</title>
	<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css" rel="stylesheet"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; }
        .navbar { background:#1a1a2e; color:white; padding:1rem 2rem;
            display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:#aaa; text-decoration:none; font-size:0.9rem; margin-left:1rem; }
        .navbar a:hover { color:white; }
        .content { padding:2rem; max-width:1000px; margin:0 auto; }
        h2 { color:#1a1a2e; margin-bottom:1.5rem; }
        .grid { display:grid; grid-template-columns:1fr 2fr; gap:1.5rem; }
        .card { background:white; border-radius:12px; padding:1.5rem;
            box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:1.5rem; }
        .card h3 { margin-bottom:1rem; color:#333; font-size:1rem; }
        .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:0.3rem; }
        label { font-size:0.8rem; color:#666; }
        input, select { padding:0.5rem 0.8rem; border:1px solid #ddd;
            border-radius:8px; font-size:0.9rem; width:100%; }
        .btn-primary { width:100%; padding:0.7rem; background:#27ae60;
            color:white; border:none; border-radius:8px; cursor:pointer; font-size:1rem; }
        .alert-success { background:#d4edda; color:#155724;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        .alert-danger { background:#ffe0e0; color:#c0392b;
            padding:0.8rem; border-radius:8px; margin-bottom:1rem; }
        table { width:100%; border-collapse:collapse; font-size:0.88rem; }
        th { text-align:left; padding:0.6rem 1rem; background:#f8f9fa; color:#666; }
        td { padding:0.6rem 1rem; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
        .badge { padding:3px 10px; border-radius:12px; font-size:0.75rem; font-weight:500; }
        .badge-encours { background:#fff3cd; color:#856404; }
        .badge-validee { background:#d4edda; color:#155724; }
        .btn { padding:0.4rem 0.8rem; border-radius:8px; text-decoration:none;
            font-size:0.8rem; display:inline-block; border:none; cursor:pointer; }
        .btn-info { background:#4361ee; color:white; }
        .btn-success { background:#27ae60; color:white; }
    </style>
</head>
<body>
<nav class="navbar">
    <span style="font-weight:500;">🏪 Gestion Commerciale</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/articles/stock}">Stock</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none; border:none; color:#aaa;
                    cursor:pointer; font-size:0.9rem;">Déconnexion</button>
        </form>
    </div>
</nav>
<div class="content">
    <h2>📦 Réceptions de marchandises</h2>

    <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
    <div class="alert-danger"  th:if="${erreur}" th:text="${erreur}"></div>

    <div class="grid">
        <!-- Nouvelle réception -->
        <div class="card">
            <h3>Nouvelle réception</h3>
            <form th:action="@{/receptions/ouvrir}" method="post">
                <div class="form-group">
                    <label>Magasin destinataire</label>
                    <select name="localId" required>
                        <option value="">-- Choisir le magasin --</option>
                        <option th:each="m : ${magasins}"
                                th:value="${m.id}"
                                th:text="${m.nom}"></option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">
                    ➕ Ouvrir un panier de réception
                </button>
            </form>
        </div>

        <!-- Historique réceptions -->
        <div class="card">
            <h3>Historique des réceptions</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Magasin</th>
                        <th>Articles</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${receptions}">
                        <td th:text="${#temporals.format(r.dateReception, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${r.local.nom}"></td>
                        <td th:text="${r.lignes.size()} + ' réf.'"></td>
                        <td>
                            <span th:if="${r.statut == 'EN_COURS'}"
                                  class="badge badge-encours">En cours</span>
                            <span th:if="${r.statut == 'VALIDEE'}"
                                  class="badge badge-validee">Validée</span>
                        </td>
                        <td>
                            <a th:if="${r.statut == 'EN_COURS'}"
                               th:href="@{/receptions/panier/{id}(id=${r.id})}"
                               class="btn btn-info">Continuer</a>
                            <a th:if="${r.statut == 'VALIDEE'}"
                               th:href="@{/receptions/detail/{id}(id=${r.id})}"
                               class="btn btn-success">Voir</a>
                        </td>
                    </tr>
                    <tr th:if="${receptions.empty}">
                        <td colspan="5"
                            style="text-align:center; color:#999; padding:2rem;">
                            Aucune réception enregistrée.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
$(document).ready(function() {
    $('#selectArticle').select2({
        placeholder: 'Tapez pour rechercher un article...',
        allowClear: true,
        width: '100%'
    });
});
</script>
</body>
</html>
